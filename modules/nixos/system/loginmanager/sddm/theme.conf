[General]
scale = @scale@
enable-animations = true
animated-background-placeholder = ""
background-fill-mode = "fill"

[LockScreen]
display = false
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = ""
use-background-color = true
background-color = "#@base00@"
blur = 0
brightness = 0.0
saturation = 0.0

[LockScreen.Clock]
display = true
position = "center"
align = "center"
format = "hh:mm"
font-family = "@font@"
font-size = 70
font-weight = 900
color = "#@base05@"

[LockScreen.Date]
display = true
format = "dddd, MMMM dd, yyyy"
locale = "en_US"
font-family = "@font@"
font-size = 14
font-weight = 600
color = "#@base05@"
margin-top = -15

[LockScreen.Message]
display = true
position = "bottom-center"
align = "center"
text = "Press any key"
font-family = "@font@"
font-size = 12
font-weight = 400
display-icon = true
icon = "enter.svg"
icon-size = 16
color = "#@base05@"
paint-icon = true
spacing = 0

[LoginScreen]
background = "wallpaper2.jpg"
use-background-color = false
background-color = "#@base00@"
blur = 0.0
brightness = -0.1
saturation = 0.0

[LoginScreen.LoginArea]
position = "center"
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 1
inactive-size = 1
inactive-opacity = 0.0
active-border-size = 0
inactive-border-size = 0
active-border-color = "#@base0E@"
inactive-border-color = "#@base0E@"
always-active = false

[LoginScreen.LoginArea.Username]
font-family = "@font@"
font-size = 36
font-weight = 700
color = "#@base05@"
margin = 10

[LoginScreen.LoginArea.PasswordInput]
width = 200
height = 30
display-icon = false
font-family = "@font@"
font-size = 12
icon = "password.svg"
icon-size = 16
content-color = "#@base05@"
background-color = "#@base01@"
background-opacity = 1.0
border-size = 0
border-color = "#@base0E@"
border-radius-left = 10
border-radius-right = 10
margin-top = 10
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#@base01@"
background-opacity = 1.0
active-background-color = "#@base0E@"
active-background-opacity = 1.0
icon = "arrow-right.svg"
icon-size = 18
content-color = "#@base0E@"
active-content-color = "#@base00@"
border-size = 0
border-color = "#@base0E@"
border-radius-left = 10
border-radius-right = 10
margin-left = 5
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "@font@"
font-size = 12
font-weight = 600

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Logging in"
font-family = "@font@"
font-weight = 600
font-size = 14
icon-size = 30
icon = "spinner.svg"
color = "#@base05@"
spacing = 5

[LoginScreen.LoginArea.WarningMessage]
font-family = "@font@"
font-size = 11
font-weight = 400
normal-color = "#@base05@"
warning-color = "#@base0A@"
error-color = "#@base08@"
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 0
margin-right = 0
margin-bottom = 100
margin-left = 0
size = 30
border-radius = 10
spacing = 20
font-family = "@font@"

[LoginScreen.MenuArea.Popups]
max-height = 230
item-height = 30
item-spacing = 2
padding = 5
display-scrollbar = false
margin = 5
background-color = "#@base01@"
background-opacity = 1.0
active-option-background-color = "#@base02@"
active-option-background-opacity = 1.0
content-color = "#@base05@"
active-content-color = "#@base0E@"
font-family = "@font@"
border-size = 0
border-color = "#@base0E@"
font-size = 11
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
display-session-name = false
button-width = -1
popup-width = 200
background-color = "#@base0E@"
background-opacity = 0.0
active-background-opacity = 1.0
content-color = "#@base05@"
active-content-color = "#@base00@"
border-size = 0
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = false
background-color = "#@base0E@"
background-opacity = 0.0
active-background-opacity = 1.0
content-color = "#@base05@"
active-content-color = "#@base00@"
border-size = 0
font-size = 10
icon = "language.svg"
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = "bottom-center"
index = 0
background-color = "#@base0E@"
background-opacity = 0.0
active-background-opacity = 1.0
content-color = "#@base05@"
active-content-color = "#@base00@"
border-size = 0
icon = "keyboard.svg"
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#@base0E@"
background-opacity = 0.0
active-background-opacity = 1.0
content-color = "#@base05@"
active-content-color = "#@base00@"
border-size = 0
icon = "power.svg"
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#@base01@"
background-opacity = 0.15
key-content-color = "#@base05@"
key-color = "#@base01@"
key-opacity = 1.0
key-active-background-color = "#@base02@"
key-active-opacity = 1.0
selection-background-color = "#@base05@"
selection-content-color = "#@base00@"
primary-color = "#@base0E@"
border-size = 0
border-color = "#@base0E@"
restrict-input = "none"

[Tooltips]
enable = true
font-family = "@font@"
font-size = 11
content-color = "#@base05@"
background-color = "#@base01@"
background-opacity = 1.0
border-radius = 10
disable-user = false
disable-login-button = false
